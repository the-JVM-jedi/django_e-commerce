{% extends "base.html" %}

{% block content %}
  <h1>{{ product.name }}</h1>
  <p>{{ product.description }}</p>
  <p>Price: {{ product.price }}</p>
  <p>Stock: {{ product.stock }}</p>

  {% if product.image %}
    <img src="{{ product.image.url }}" width="300">
  {% endif %}

  <button>Add to Cart</button>
{% endblock %}
